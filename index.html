<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README Template Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md text-center">
        <h1 class="text-3xl font-bold mb-4">README Generator</h1>
        <p class="text-gray-600 mb-6">Craft a professional GitHub README in minutes.</p>
        
        <button id="purchaseButton" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded focus:outline-none focus:shadow-outline transition duration-300 ease-in-out">
            Get Started - $4.99
        </button>
        
        <div class="mt-6 text-sm text-gray-500">
            <p>&copy; 2023 APEX. All rights reserved.</p>
            <a href="#" class="text-blue-500 hover:underline">Privacy Policy</a>
        </div>
    </div>
    <script src="https://js.stripe.com/v3/"></script>
    <script>
        const stripe = Stripe('pk_test_YOUR_STRIPE_PUBLIC_KEY'); // Replace with your actual public key
        const purchaseButton = document.getElementById('purchaseButton');

        purchaseButton.addEventListener('click', async () => {
            const { error } = await stripe.redirectToCheckout({
                lineItems: [{ price: 'price_YOUR_PRODUCT_PRICE_ID', quantity: 1 }], // Replace with your actual Price ID
                mode: 'payment',
                successUrl: window.location.origin + '/success.html',
                cancelUrl: window.location.origin + '/cancel.html',
            });

            if (error) {
                console.error("Stripe Checkout error:", error);
                alert("There was an issue processing your payment. Please try again.");
            }
        });
    </script>
</body>
</html>
